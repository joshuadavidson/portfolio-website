<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 10 Score Tracker</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1RLJWJ7B5D"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-1RLJWJ7B5D');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #004998;
      /* Phase 10 Blue */
      color: #ffffff;
    }

    .phase-card {
      background: #ffffff;
      color: #171717;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background-color: #dc2626;
      /* Classic Red */
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background-color: #b91c1c;
      transform: translateY(-1px);
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .color-dot {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.2s;
    }

    .color-dot.active {
      border-color: #004998;
      transform: scale(1.2);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .title-glow {
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    #setup-view {
      background: #ffffff;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .player-color-bar {
      width: 8px;
      height: 100%;
      position: absolute;
      left: 0;
      top: 0;
    }

    #winner-overlay {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .history-container {
      border-top: 1px dashed #e5e7eb;
      margin-top: 12px;
      padding-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 26px;
      /* Stabilizes card height */
      align-items: center;
    }

    .history-span {
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
      font-size: 10px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .card-inactive {
      opacity: 0.5;
      filter: grayscale(0.5);
      pointer-events: none;
    }

    .card-inactive .edit-trigger {
      pointer-events: auto;
      /* Allow editing even if faded */
    }
  </style>
</head>

<body class="min-h-screen pb-20">

  <div class="max-w-md mx-auto px-4 pt-6">
    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-4xl font-black tracking-tighter italic title-glow text-white">
        Phase 10
      </h1>
    </div>

    <!-- Add Player Card -->
    <div id="setup-view" class="mb-3 p-4 rounded-xl">
      <div class="flex flex-col gap-2">
        <div class="flex gap-2">
          <input type="text" id="player-name" placeholder="Player Name"
            class="flex-1 bg-neutral-100 border border-neutral-200 rounded-lg px-3 py-3 focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all text-neutral-900 placeholder-neutral-400 font-semibold text-sm">

          <select id="color-select"
            class="bg-neutral-100 border border-neutral-200 rounded-lg px-2 py-3 focus:outline-none focus:ring-2 focus:ring-blue-600 font-bold text-neutral-700 cursor-pointer text-sm">
          </select>
        </div>
        <button onclick="addPlayer()"
          class="btn-primary text-white font-black px-6 py-3 rounded-lg uppercase tracking-wider text-xs shadow-md">
          Add Player
        </button>
      </div>
    </div>

    <!-- Quick Access Guides -->
    <div class="flex justify-between items-center my-6 px-1">
      <button onclick="toggleReference()"
        class="text-yellow-400 text-sm font-black uppercase tracking-widest hover:text-yellow-300 transition-colors">Phase
        Guide</button>
      <button onclick="toggleScoring()"
        class="text-yellow-400 text-sm font-black uppercase tracking-widest hover:text-yellow-300 transition-colors">Scoring
        Guide</button>
    </div>

    <!-- Player List -->
    <div id="player-list" class="space-y-3"></div>

    <!-- Global Action Button -->
    <div id="finish-round-container" class="hidden mt-6">
      <button onclick="finishRound()"
        class="w-full bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-black py-4 rounded-xl shadow-xl uppercase tracking-[0.2em] transition-all transform hover:scale-[1.01] active:scale-95 text-sm">
        Finish Round
      </button>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="text-center py-12 opacity-40">
      <p class="text-xs font-bold uppercase tracking-widest text-white">Add players to begin</p>
    </div>
  </div>

  <!-- Phase Reference Modal -->
  <div id="reference-modal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-md"
    onclick="handleBackdropClick(event, 'reference-modal')">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl" onclick="event.stopPropagation()">
      <h2 class="text-xl font-black italic mb-4 text-neutral-900 text-center uppercase tracking-tighter">Phase Guide
      </h2>
      <div class="space-y-2 text-sm mb-6" id="phase-guide-content"></div>
      <button onclick="toggleReference()"
        class="w-full py-3 btn-primary text-white rounded-lg font-black uppercase tracking-widest text-xs shadow-sm">Close</button>
    </div>
  </div>

  <!-- Scoring Guide Modal -->
  <div id="scoring-modal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-md"
    onclick="handleBackdropClick(event, 'scoring-modal')">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl" onclick="event.stopPropagation()">
      <h2 class="text-xl font-black italic mb-4 text-neutral-900 text-center uppercase tracking-tighter">Scoring Guide
      </h2>
      <div class="space-y-2 text-sm mb-6">
        <div class="flex justify-between items-center bg-neutral-50 p-3 rounded-lg border border-neutral-100">
          <span class="font-bold text-neutral-600 uppercase tracking-tight">Cards 1–9</span>
          <span class="font-black text-blue-600 text-lg">5 Pts</span>
        </div>
        <div class="flex justify-between items-center bg-neutral-50 p-3 rounded-lg border border-neutral-100">
          <span class="font-bold text-neutral-600 uppercase tracking-tight">Cards 10–12</span>
          <span class="font-black text-yellow-600 text-lg">10 Pts</span>
        </div>
        <div class="flex justify-between items-center bg-neutral-50 p-3 rounded-lg border border-neutral-100">
          <span class="font-bold text-neutral-600 uppercase tracking-tight">Skip Card</span>
          <span class="font-black text-orange-600 text-lg">15 Pts</span>
        </div>
        <div class="flex justify-between items-center bg-neutral-50 p-3 rounded-lg border border-neutral-100">
          <span class="font-bold text-neutral-600 uppercase tracking-tight">Wild Card</span>
          <span class="font-black text-red-600 text-lg">25 Pts</span>
        </div>
      </div>
      <button onclick="toggleScoring()"
        class="w-full py-3 btn-primary text-white rounded-lg font-black uppercase tracking-widest text-xs shadow-sm">Close</button>
    </div>
  </div>

  <!-- Edit Player Modal -->
  <div id="edit-modal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-md"
    onclick="handleBackdropClick(event, 'edit-modal')">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl" onclick="event.stopPropagation()">
      <h2 class="text-xl font-black italic mb-4 text-neutral-900 text-center uppercase tracking-tighter">Edit Player
      </h2>
      <div class="space-y-4">
        <div>
          <label class="text-[9px] font-black text-neutral-500 uppercase tracking-[0.2em] ml-1">Name</label>
          <input type="text" id="edit-name"
            class="w-full bg-neutral-100 border border-neutral-200 rounded-lg px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-600 font-bold text-neutral-900 text-sm">
        </div>
        <div>
          <label class="text-[9px] font-black text-neutral-500 uppercase tracking-[0.2em] ml-1">Color</label>
          <div class="flex justify-between mt-2" id="color-picker-edit"></div>
        </div>
        <div class="pt-2">
          <label class="flex items-center gap-3 cursor-pointer group">
            <input type="checkbox" id="edit-active"
              class="w-5 h-5 rounded border-neutral-300 text-red-600 focus:ring-0 cursor-pointer">
            <span
              class="text-xs font-black text-neutral-700 uppercase tracking-wider group-hover:text-red-600 transition-colors">Currently
              Playing</span>
          </label>
        </div>
        <div class="flex flex-col gap-2 pt-2">
          <button onclick="savePlayerEdit()"
            class="w-full py-3 btn-primary text-white rounded-lg font-black uppercase tracking-widest text-xs shadow-sm">Save
            Changes</button>
          <button onclick="handleDeleteInModal()"
            class="w-full py-2 bg-neutral-50 text-neutral-400 rounded-lg font-black uppercase tracking-widest text-[9px] border border-neutral-200 hover:bg-red-50 hover:text-red-500 hover:border-red-100 transition-colors">Delete
            Player</button>
          <button onclick="closeEditModal()"
            class="w-full py-1 text-neutral-400 hover:text-neutral-600 font-black uppercase tracking-widest text-[9px]">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Winner Overlay -->
  <div id="winner-overlay"
    class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-lg">
    <div class="bg-white w-full max-w-sm rounded-3xl p-10 shadow-2xl text-center">
      <div class="text-blue-900 text-2xl font-black uppercase tracking-[0.4em] mb-4">🏆 Winner 🏆</div>
      <div id="winner-name"
        class="text-4xl font-black italic uppercase text-neutral-900 tracking-tighter mb-10 break-words">Player</div>
      <button onclick="resetScoresOnly()"
        class="w-full py-5 btn-primary text-white rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl transform active:scale-95 transition-transform">
        Start Next Game
      </button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'phase10_scores_data';
    const colorPalette = [
      { name: 'Red', hex: '#dc2626' },
      { name: 'Yellow', hex: '#facc15' },
      { name: 'Green', hex: '#16a34a' },
      { name: 'Blue', hex: '#2563eb' }
    ];

    let players = [];
    let editingPlayerId = null;
    let selectedEditColor = null;
    let audioCtx;
    let gameActive = true;

    const phases = [
      "2 Sets of 3",
      "1 Set of 3 + 1 Run of 4",
      "1 Set of 4 + 1 Run of 4",
      "1 Run of 7",
      "1 Run of 8",
      "1 Run of 9",
      "2 Sets of 4",
      "7 Cards of one color",
      "1 Set of 5 + 1 Set of 2",
      "1 Set of 5 + 1 Set of 3"
    ];

    function getAudioContext() {
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) audioCtx = new AudioContext();
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => { });
      }
      return audioCtx;
    }

    function playVictorySound() {
      try {
        const ctx = getAudioContext();
        if (!ctx) return;
        const C5 = 523.25, Ab4 = 415.30, Bb4 = 466.16, G4 = 392.00;
        const melody = [
          { f: C5, d: 0.1 }, { f: C5, d: 0.1 }, { f: C5, d: 0.1 }, { f: C5, d: 0.4 },
          { f: Ab4, d: 0.4 }, { f: Bb4, d: 0.4 }, { f: C5, d: 0.2 }, { f: Bb4, d: 0.1 }, { f: C5, d: 0.8 }
        ];
        let time = ctx.currentTime;
        melody.forEach(n => {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(n.f, time);
          g.gain.setValueAtTime(0.1, time);
          g.gain.linearRampToValueAtTime(0, time + n.d);
          osc.connect(g);
          g.connect(ctx.destination);
          osc.start(time);
          osc.stop(time + n.d);
          time += n.d + 0.02;
        });
      } catch (e) { }
    }

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
    }

    function loadFromStorage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        players = JSON.parse(saved).map(p => ({
          ...p,
          wins: p.wins || 0,
          gamesPlayed: p.gamesPlayed || 0,
          isActive: p.isActive !== undefined ? p.isActive : true
        }));
      }
    }

    function initColorPickers() {
      const select = document.getElementById('color-select');
      const edit = document.getElementById('color-picker-edit');

      select.innerHTML = colorPalette.map(c => `<option value="${c.hex}">${c.name}</option>`).join('');
      edit.innerHTML = colorPalette.map(c => `
                <div class="color-dot edit-dot" data-color="${c.hex}" style="background-color: ${c.hex}" onclick="setEditColor('${c.hex}')"></div>
            `).join('');
    }

    function setEditColor(hex) {
      selectedEditColor = hex;
      document.querySelectorAll('.edit-dot').forEach(dot => {
        dot.classList.toggle('active', dot.dataset.color === hex);
      });
    }

    function addPlayer() {
      const input = document.getElementById('player-name');
      const colorSelect = document.getElementById('color-select');
      const name = input.value.trim();
      if (name) {
        players.push({
          id: Date.now(),
          name: name,
          score: 0,
          currentPhase: 1,
          color: colorSelect.value,
          history: [],
          wins: 0,
          gamesPlayed: 0,
          isActive: true
        });
        input.value = '';
        saveToStorage();
        render();
      }
    }

    function finishRound() {
      if (!gameActive) return;

      players.forEach(player => {
        if (!player.isActive) return;

        const scoreInput = document.getElementById(`score-${player.id}`);
        const phaseCheck = document.getElementById(`phase-check-${player.id}`);
        if (scoreInput && phaseCheck) {
          const scoreText = scoreInput.value.trim();
          const score = scoreText === "" ? 0 : parseInt(scoreText);
          const phaseCompleted = phaseCheck.checked;

          player.history.push({
            score: score,
            phaseCompleted: phaseCompleted,
            oldPhase: player.currentPhase
          });

          player.score += score;
          if (phaseCompleted && typeof player.currentPhase === 'number') {
            if (player.currentPhase < 10) {
              player.currentPhase++;
            } else {
              player.currentPhase = "Winner!";
            }
          }
          scoreInput.value = '';
          phaseCheck.checked = false;
        }
      });

      saveToStorage();
      render();
      checkForWinner();
    }

    function checkForWinner() {
      const finishers = players.filter(p => p.currentPhase === "Winner!");
      if (finishers.length > 0 && gameActive) {
        gameActive = false;
        const sortedFinishers = [...finishers].sort((a, b) => a.score - b.score);
        const winner = sortedFinishers[0];

        // Update Lifetime Stats only for players who were active in this game
        players.forEach(p => {
          if (p.isActive) {
            p.gamesPlayed++;
            if (p.id === winner.id) p.wins++;
          }
        });

        saveToStorage();
        showWinnerOverlay(winner);
        render();
      }
    }

    function showWinnerOverlay(winner) {
      const overlay = document.getElementById('winner-overlay');
      const nameEl = document.getElementById('winner-name');

      nameEl.innerText = winner.name;
      nameEl.style.color = winner.color;
      overlay.classList.remove('hidden');

      playVictorySound();
      confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 },
        colors: colorPalette.map(c => c.hex)
      });
    }

    function resetScoresOnly() {
      players.forEach(p => {
        p.score = 0;
        p.currentPhase = 1;
        p.history = [];
      });
      gameActive = true;
      document.getElementById('winner-overlay').classList.add('hidden');
      saveToStorage();
      render();
    }

    function openEditModal(id) {
      const player = players.find(p => p.id === id);
      if (!player) return;
      editingPlayerId = id;
      selectedEditColor = player.color;
      document.getElementById('edit-name').value = player.name;
      document.getElementById('edit-active').checked = player.isActive;
      setEditColor(player.color);
      document.getElementById('edit-modal').classList.remove('hidden');
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.add('hidden');
      editingPlayerId = null;
    }

    function savePlayerEdit() {
      const player = players.find(p => p.id === editingPlayerId);
      if (player) {
        player.name = document.getElementById('edit-name').value.trim() || player.name;
        player.color = selectedEditColor;
        player.isActive = document.getElementById('edit-active').checked;
        saveToStorage();
        render();
      }
      closeEditModal();
    }

    function handleDeleteInModal() {
      if (!editingPlayerId) return;

      if (confirm("Are you sure you want to delete this player?")) {
        players = players.filter(p => p.id !== editingPlayerId);
        saveToStorage();
        render();
        closeEditModal();
      }
    }

    function toggleReference() {
      const modal = document.getElementById('reference-modal');
      modal.classList.toggle('hidden');
      if (!modal.classList.contains('hidden')) {
        document.getElementById('phase-guide-content').innerHTML = phases.map((p, i) => `
                    <div class="flex gap-3 items-center bg-neutral-50 p-2 rounded-lg border border-neutral-100">
                        <span class="font-black text-lg italic w-5" style="color: ${colorPalette[i % colorPalette.length].hex}">${i + 1}</span> 
                        <span class="font-bold text-sm uppercase tracking-tight text-neutral-600">${p}</span>
                    </div>
                `).join('');
      }
    }

    function toggleScoring() {
      const modal = document.getElementById('scoring-modal');
      modal.classList.toggle('hidden');
    }

    function handleBackdropClick(event, modalId) {
      if (event.target.id === modalId) {
        document.getElementById(modalId).classList.add('hidden');
        if (modalId === 'edit-modal') editingPlayerId = null;
      }
    }

    function render() {
      const list = document.getElementById('player-list');
      const emptyState = document.getElementById('empty-state');
      const finishContainer = document.getElementById('finish-round-container');

      if (players.length === 0) {
        list.innerHTML = '';
        emptyState.classList.remove('hidden');
        finishContainer.classList.add('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      finishContainer.classList.remove('hidden');

      list.innerHTML = players.map((player) => {
        const winPct = player.gamesPlayed > 0 ? Math.round((player.wins / player.gamesPlayed) * 100) : 0;

        const historyHtml = `
                    <div class="history-container">
                        ${player.history.length > 0
            ? player.history.map(h => {
              const style = h.phaseCompleted
                ? `background-color: ${player.color}; color: white; border-color: ${player.color};`
                : `background-color: #f3f4f6; color: #4b5563; border-color: #e5e7eb;`;
              return `<span class="history-span" style="${style}" title="Phase ${h.oldPhase}${h.phaseCompleted ? ' ✔' : ''}">${h.score}</span>`;
            }).join('')
            : `<span class="text-[10px] text-neutral-300 font-bold italic uppercase tracking-wider">No score yet</span>`
          }
                    </div>
                `;

        const isActive = player.isActive;

        return `
                <div class="phase-card p-4 rounded-xl relative overflow-hidden shadow-lg border border-neutral-200 ${!isActive ? 'card-inactive' : ''}">
                    <div class="player-color-bar" style="background-color: ${player.color}"></div>
                    
                    <button onclick="openEditModal(${player.id})" class="edit-trigger absolute top-4 right-4 text-neutral-300 hover:text-neutral-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>

                    <div class="flex flex-col mb-4 pl-2 pr-8">
                        <div class="flex items-center gap-2">
                            <h3 class="text-xl font-black italic uppercase text-neutral-900 leading-none">${player.name}</h3>
                            <div class="bg-yellow-400 text-blue-900 text-[10px] font-black px-3 py-0.5 rounded-full uppercase tracking-normal flex items-center gap-1.5">
                                <span>🏆 ${player.wins} Wins</span>
                                <span>(${winPct}%)</span>
                            </div>
                        </div>
                        <div class="mt-2 flex items-center gap-2">
                            <span class="text-xs font-black px-3 py-1.5 rounded-full uppercase tracking-wider leading-none" style="background: ${player.color}15; color: ${player.color}">
                                Phase ${player.currentPhase}
                            </span>
                            <span class="text-[11px] text-neutral-400 font-bold uppercase leading-tight">
                                ${typeof player.currentPhase === 'number' ? phases[player.currentPhase - 1] : 'Victory Reached'}
                            </span>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 pl-2">
                        <div class="text-2xl font-black text-neutral-900 leading-none min-w-[2.5rem] text-center">
                            ${player.score}
                        </div>

                        <div class="flex-1">
                            <input type="number" id="score-${player.id}" placeholder="Pts..." ${!isActive ? 'disabled' : ''}
                                class="w-full bg-neutral-50 border border-neutral-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-500 text-lg font-black text-neutral-900 placeholder-neutral-300">
                        </div>

                        <label class="flex items-center gap-2 px-1 cursor-pointer">
                            <input type="checkbox" id="phase-check-${player.id}" ${!isActive ? 'disabled' : ''}
                                style="accent-color: ${player.color}"
                                class="w-6 h-6 rounded border-neutral-300 focus:ring-0 cursor-pointer">
                            <span class="text-[11px] text-neutral-700 font-black uppercase tracking-wider leading-none">Phase<br>Met</span>
                        </label>
                    </div>
                    ${historyHtml}
                </div>
                `;
      }).join('');
    }

    window.onload = function () {
      loadFromStorage();
      initColorPickers();
      render();
      // In case page was refreshed while winner was determined but not reset
      const finishers = players.filter(p => p.currentPhase === "Winner!");
      if (finishers.length > 0) gameActive = false;
      checkForWinner();
    }
  </script>
</body>

</html>
